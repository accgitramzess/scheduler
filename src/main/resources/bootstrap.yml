quartz:
  auto-startup: true
  jdbc-store: true
  scheduler:
      instance-name: myapp_quartz
      instance-id: AUTO
      skip-update-check: true
  thread-pool:
      class: org.quartz.simpl.SimpleThreadPool
      thread-count: 5
      thread-priority: 5
  job-store:
      misfire-threshold: 60000
      class: org.quartz.impl.jdbcjobstore.JobStoreTX
      driver-delegate-class: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
      use-properties: false
      table-prefix: QRTZ_
      is-clustered: true
      cluster-checkin-interval: 1000
  plugin:
      shutdownhook:
          class: org.quartz.plugins.management.ShutdownHookPlugin
          cleanShutdown: true
  trigger-history:
      class: org.quartz.plugins.history.LoggingTriggerHistoryPlugin
  job-history:
      class: org.quartz.plugins.history.LoggingJobHistoryPlugin
